<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#ffffff" rx="40"/>
  
  <!-- Green circle -->
  <circle cx="200" cy="155" r="90" fill="#16a34a"/>
  
  <!-- Scale icon (white) -->
  <!-- Center post -->
  <rect x="196" y="115" width="8" height="70" fill="white" rx="4"/>
  <!-- Horizontal arm -->
  <rect x="150" y="122" width="100" height="7" fill="white" rx="3.5"/>
  <!-- Left pan string -->
  <line x1="157" y1="129" x2="148" y2="162" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Right pan string -->
  <line x1="243" y1="129" x2="252" y2="162" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Left pan -->
  <path d="M128 162 Q148 175 168 162" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Right pan -->
  <path d="M232 162 Q252 175 272 162" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="185" y="182" width="30" height="6" fill="white" rx="3"/>
  <rect x="178" y="185" width="44" height="5" fill="white" rx="2.5"/>

