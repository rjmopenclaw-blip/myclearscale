  <text x="200" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="#0f172a" text-anchor="middle" letter-spacing="-1">
    <tspan fill="#16a34a">my</tspan>ClearScale
